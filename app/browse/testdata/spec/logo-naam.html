<script type="text/x-expect">
# het logo-slot zonder JS (tweakers' lege twk-icon): alléén het

# merknaam immers zelf
plaatjes 1
verborgen "Voorbeeldsite"
# een leeg element met role="img" en een aria-label is een afbeelding met
# alt-tekst: het alt-principe, dus toon het label
zichtbaar "weerbericht icoon"
onder "onder de balk" "Nieuws"
</script>
