<!doctype html>
<html><head><style>
.rij { display: flex; flex-flow: row nowrap; }
.een { order: 2; background: #ffdddd; }
.twee { order: 1; background: #ddffdd; }
.wikkel { display: flex; flex-flow: row wrap-reverse; }
.w { background: #eeeeee; }
</style></head><body>
<div class="rij"><div class="een">eerste in dom</div><div class="twee">tweede in dom</div></div>
<div class="wikkel"><div class="w">w1</div><div class="w">w2</div><div class="w">w3</div><div class="w">w4</div><div class="w">w5</div><div class="w">w6</div></div>
</body></html>
<script type="text/x-expect">
# order draait de visuele volgorde om, de DOM blijft zoals hij is
rechtsvan "eerste in dom" "tweede in dom"
# flex-flow is de shorthand voor direction + wrap
rechtsvan "w2" "w1"
# wrap-reverse: de eerste DOM-rij komt onderaan
onder "w1" "w3"
</script>
