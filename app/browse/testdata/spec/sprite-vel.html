<!doctype html>
<html><head><style>
  /* wikipedia's wordmark-patroon: een span met het geneste sprite-vel als
     achtergrond, de tekst weggeschoven — het element ís het plaatje */
  /* de gradient-vóór-de-url is wikipedia's svg-fallback-truc: de url telt */
  .sprite { background-image: linear-gradient(transparent,transparent), url(/pix/nest.svg);
            display: inline-block; overflow: hidden; text-indent: -10000px; color: transparent; }
  .boven { width: 60px; height: 40px; background-position: 0 0; }
  .onder { width: 50px; height: 30px; background-position: 0 -40px; }
</style></head><body>
<p>vel met logo's:</p>
<p><span class="sprite boven">Boven</span></p>
<p><span class="sprite onder">Onder</span></p>
</body></html>
<script type="text/x-expect">
# het geneste vel is per sub-logo gerasterd en samengelegd: de crop
# bovenin is rood, die eronder groen (wikipedia's wordmark en
# zuster-iconen komen zo uit één sheet)
plaatpunt 60 40 30 20 #cc2200
plaatpunt 50 30 25 15 #22aa44
</script>
