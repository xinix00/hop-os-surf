<!doctype html>
<html><head><style>
.icoon { width: 32px; height: 32px; }
.half { width: 50%; }
.hokje { width: 40px; height: 40px; }
</style></head><body>
<p><svg class="icoon" viewBox="0 0 24 24"><rect width="24" height="24" fill="#cc2200"></rect></svg></p>
<p><svg width="48" height="24"><rect width="48" height="24" fill="#0022cc"></rect></svg></p>
<p><svg viewBox="0 0 1000 200"><rect width="1000" height="200" fill="#22aa44"></rect></svg></p>
<p><svg class="half" viewBox="0 0 100 50"><rect width="100" height="50" fill="#aa22aa"></rect></svg></p>
<p><img src="/pix/breed.svg" alt="breed"></p>
<p><svg class="hokje" viewBox="0 0 100 20"><rect width="100" height="20" fill="#cc7700"></rect></svg></p>
</body></html>
<script type="text/x-expect">
# CSS-maat wint (32x32-icoon), attributen zijn de eigen maat (48x24)
plaatmaat 32 32
plaatmaat 48 24
# alléén een viewBox is een coordinatenstelsel, geen maat: de CSS default
# object size geldt — de grootste rechthoek met die verhouding in 300x150
plaatmaat 300 60
# een procent-breedte rekent tegen de beschikbare ruimte (50% van 468)
plaatmaat 234 117
# zelfde spec-regel voor <img src="*.svg"> zonder maten (viewBox 1000x200)
plaatmaat 300 60
# preserveAspectRatio (default meet): een brede vector in een vierkante
# doos wordt gepast (letterbox), niet uitgerekt
pasplaat 40 40
</script>
